name: Sync upstream

on:
  schedule:
    - cron: "17 10 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: sync-upstream

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/voidful/claude-html-report-skill.git
          git fetch upstream main

          if ! git merge --no-edit upstream/main; then
            conflicts=$(git diff --name-only --diff-filter=U)
            upstream_sha=$(git rev-parse upstream/main)
            git merge --abort
            issue=$(gh issue list --state open --search '"Upstream sync conflict" in:title' --json number --jq '.[0].number')
            body=$(printf 'The weekly sync could not merge upstream commit `%s` automatically.\n\nConflicting files:\n```text\n%s\n```\n\nResolve this while preserving the intent of our local changes, validate the result, and close this issue.' "$upstream_sha" "$conflicts")

            if [ -n "$issue" ]; then
              gh issue edit "$issue" --body "$body" --add-assignee "$GITHUB_REPOSITORY_OWNER"
            else
              gh issue create --title "Upstream sync conflict" --body "$body" --assignee "$GITHUB_REPOSITORY_OWNER"
            fi
            exit 1
          fi

          python3 -m json.tool .claude/skills/html-report/config.json >/dev/null
          python3 -m py_compile .claude/skills/html-report/scripts/publish.py
          git push origin main
